<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Jump ring aspect ratio calculator for chainmail jewelry makers. Supports inches, mm, cm, gauge numbers, and fractional inputs.">
<meta name="keywords" content="jump ring calculator, aspect ratio calculator, chainmail calculator, jewelry making tools, AWG SWG ring sizes">
<meta name="author" content="I">
<title>Jump Ring Aspect Ratio Calculator</title>

<style>
body {
  max-width: 480px;
  margin: auto;
  padding: 16px;
  font-family: Arial, sans-serif;
  background: #fafafa;
  color: #1d2630;
}

h2, h3, h4 {
  margin-top: 20px;
  text-align: center;
}

.intro {
  margin: 0 auto 20px;
  color: #4c5a69;
  line-height: 1.45;
  text-align: center;
}

label {
  display: block;
  margin: 12px 0 6px;
  font-weight: bold;
}

input, select {
  width: 100%;
  padding: 12px;
  font-size: 1.1rem;
  border: 1px solid #ccc;
  border-radius: 6px;
  box-sizing: border-box;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 20px;
  background: #0078ff;
  color: white;
  font-size: 1.2rem;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #005fcc;
}

#result, #recommendations {
  margin-top: 20px;
  padding: 12px;
  background: #f7f7f7;
  border-radius: 6px;
  font-size: 1.05rem;
}

.result-card,
.recommendation-card {
  margin-top: 12px;
  padding: 12px;
  background: white;
  border: 1px solid #d5dde6;
  border-radius: 6px;
}

.result-card h4,
.recommendation-card h4 {
  margin: 0 0 8px;
  text-align: left;
}

.result-line,
.recommendation-item,
.result-note {
  margin: 6px 0;
}

.result-note {
  color: #4c5a69;
}

@media (max-width: 480px) {
  input, select, button {
    font-size: 1.15rem;
    padding: 14px;
  }

  label {
    font-size: 1.05rem;
  }
}
</style>
</head>

<body>

<h2>Jump Ring Aspect Ratio Calculator</h2>
<p class="intro">Aspect Ratio = inner diameter / wire diameter. Enter a gauge number to compare that same size in both AWG and SWG, or enter a direct wire diameter and see the AR labeled both ways.</p>

<h3>Inner Diameter</h3>
<label>Unit:
  <select id="idUnit" onchange="toggleIDInputs()">
    <option value="in">Inches</option>
    <option value="mm">Millimeters</option>
    <option value="cm">Centimeters</option>
  </select>
</label>

<div id="idInchInputs">
  <label>Common Fractions:
    <select id="idFraction">
      <option value="">(choose)</option>
      <option>1/16</option>
      <option>1/8</option>
      <option>3/16</option>
      <option>1/4</option>
      <option>5/16</option>
      <option>3/8</option>
      <option>7/16</option>
      <option>1/2</option>
    </select>
  </label>
  <label>Or type your own:
    <input id="idCustom" placeholder="e.g. 3/16 or 1 5/32">
  </label>
</div>

<div id="idMetricInput" style="display:none;">
  <label>Value:
    <input id="idMetric" type="number" step="0.01">
  </label>
</div>

<h3>Wire Size</h3>
<label>Wire Input Type:
  <select id="wireType" onchange="toggleWireInputs()">
    <option value="gauge">Gauge Number</option>
    <option value="in">Inches</option>
    <option value="mm">Millimeters</option>
    <option value="cm">Centimeters</option>
  </select>
</label>

<div id="wireGaugeInputs">
  <label>Gauge number:
    <input id="wireGauge" type="number" min="0" max="30" step="1">
  </label>
</div>

<div id="wireInchInputs" style="display:none;">
  <label>Common Fractions:
    <select id="wireFraction">
      <option value="">(choose)</option>
      <option>1/32</option>
      <option>1/16</option>
      <option>3/32</option>
      <option>1/8</option>
    </select>
  </label>
  <label>Or type your own:
    <input id="wireCustom" placeholder="e.g. 1/16">
  </label>
</div>

<div id="wireMetricInput" style="display:none;">
  <label>Value:
    <input id="wireMetric" type="number" step="0.01">
  </label>
</div>

<button onclick="calculateAR()">Calculate AR</button>

<h3>Results</h3>
<div id="result" aria-live="polite"></div>
<div id="recommendations" aria-live="polite"></div>

<script>
const AWG = {
  0:0.3249,1:0.2893,2:0.2576,3:0.2294,4:0.2043,5:0.1819,6:0.1620,7:0.1443,8:0.1285,
  9:0.1144,10:0.1019,11:0.0907,12:0.0808,13:0.0720,14:0.0641,15:0.0571,16:0.0508,
  17:0.0453,18:0.0403,19:0.0359,20:0.0320,21:0.0285,22:0.0253,23:0.0226,24:0.0201,
  25:0.0179,26:0.0159,27:0.0142,28:0.0126,29:0.0113,30:0.0100
};

const SWG = {
  0:0.3240,1:0.3000,2:0.2760,3:0.2520,4:0.2320,5:0.2120,6:0.1920,7:0.1760,8:0.1600,
  9:0.1440,10:0.1280,11:0.1160,12:0.1040,13:0.0920,14:0.0800,15:0.0720,16:0.0640,
  17:0.0560,18:0.0480,19:0.0400,20:0.0360,21:0.0320,22:0.0280,23:0.0240,24:0.0220,
  25:0.0200,26:0.0180,27:0.0164,28:0.0148,29:0.0136,30:0.0124
};

const RECOMMENDED_AR = {
  "European 4-in-1": [3.0, 4.0],
  "European 6-in-1": [4.0, 5.0],
  "Byzantine": [3.2, 3.8],
  "Box Chain": [3.0, 3.5],
  "Half Persian 3-in-1": [4.0, 5.0],
  "Half Persian 4-in-1": [5.0, 6.0],
  "Full Persian": [5.0, 6.0]
};

const WIRE_SYSTEMS = [
  { key: "awg", label: "AWG", table: AWG },
  { key: "swg", label: "SWG", table: SWG }
];

function parseFraction(str) {
  if (!str) return null;

  const value = str.trim();
  if (!value) return null;

  const mixedMatch = value.match(/^(\d+)\s+(\d+)\s*\/\s*(\d+)$/);
  if (mixedMatch) {
    const whole = Number(mixedMatch[1]);
    const numerator = Number(mixedMatch[2]);
    const denominator = Number(mixedMatch[3]);
    if (denominator === 0) return null;
    return whole + (numerator / denominator);
  }

  const fractionMatch = value.match(/^(\d+)\s*\/\s*(\d+)$/);
  if (fractionMatch) {
    const numerator = Number(fractionMatch[1]);
    const denominator = Number(fractionMatch[2]);
    if (denominator === 0) return null;
    return numerator / denominator;
  }

  if (/^(?:\d+\.?\d*|\.\d+)$/.test(value)) {
    const parsed = Number(value);
    return Number.isFinite(parsed) ? parsed : null;
  }

  return null;
}

function toInches(value, unit) {
  if (!Number.isFinite(value) || value <= 0) return null;
  if (unit === "mm") return value / 25.4;
  if (unit === "cm") return value / 2.54;
  return value;
}

function formatInches(value) {
  return `${value.toFixed(4)} in`;
}

function getFractionOrCustomValue(selectId, inputId) {
  const custom = document.getElementById(inputId).value.trim();
  if (custom) return parseFraction(custom);
  return parseFraction(document.getElementById(selectId).value);
}

function renderError(message) {
  document.getElementById("result").textContent = message;
  document.getElementById("recommendations").innerHTML = "";
}

function toggleIDInputs() {
  const unit = document.getElementById("idUnit").value;
  document.getElementById("idInchInputs").style.display = unit === "in" ? "block" : "none";
  document.getElementById("idMetricInput").style.display = unit !== "in" ? "block" : "none";
}

function toggleWireInputs() {
  const type = document.getElementById("wireType").value;
  document.getElementById("wireGaugeInputs").style.display = type === "gauge" ? "block" : "none";
  document.getElementById("wireInchInputs").style.display = type === "in" ? "block" : "none";
  document.getElementById("wireMetricInput").style.display = (type === "mm" || type === "cm") ? "block" : "none";
}

function buildRecommendations(label, ar) {
  let html = `<div class="recommendation-card"><h4>${label} Weave Suitability</h4>`;

  for (const weave in RECOMMENDED_AR) {
    const [low, high] = RECOMMENDED_AR[weave];
    if (ar >= low && ar <= high) {
      html += `<div class="recommendation-item">${weave}: suitable (ideal ${low.toFixed(1)} to ${high.toFixed(1)})</div>`;
    } else if (ar < low) {
      html += `<div class="recommendation-item">${weave}: too tight (needs at least ${low.toFixed(1)})</div>`;
    } else {
      html += `<div class="recommendation-item">${weave}: too loose (needs at most ${high.toFixed(1)})</div>`;
    }
  }

  html += "</div>";
  return html;
}

function buildResultCard(label, ar, wireDiameterInches) {
  return `
    <div class="result-card">
      <h4>${label} Aspect Ratio</h4>
      <div class="result-line">AR = inner diameter / wire diameter</div>
      <div class="result-line"><strong>${ar.toFixed(2)}</strong></div>
      <div class="result-line">Wire diameter used: ${formatInches(wireDiameterInches)}</div>
    </div>
  `;
}

function calculateAR() {
  const idUnit = document.getElementById("idUnit").value;
  let innerDiameterInches;

  if (idUnit === "in") {
    innerDiameterInches = getFractionOrCustomValue("idFraction", "idCustom");
  } else {
    const value = parseFloat(document.getElementById("idMetric").value);
    innerDiameterInches = toInches(value, idUnit);
  }

  if (!Number.isFinite(innerDiameterInches) || innerDiameterInches <= 0) {
    renderError("Invalid inner diameter.");
    return;
  }

  const wireType = document.getElementById("wireType").value;
  let wireDiameters;
  let note;

  if (wireType === "gauge") {
    const gaugeValue = Number(document.getElementById("wireGauge").value);
    if (!Number.isInteger(gaugeValue) || !(gaugeValue in AWG) || !(gaugeValue in SWG)) {
      renderError("Invalid gauge number.");
      return;
    }

    wireDiameters = {
      awg: AWG[gaugeValue],
      swg: SWG[gaugeValue]
    };
    note = `Gauge ${gaugeValue} is compared using both AWG and SWG tables.`;
  } else if (wireType === "in") {
    const wireInches = getFractionOrCustomValue("wireFraction", "wireCustom");
    if (!Number.isFinite(wireInches) || wireInches <= 0) {
      renderError("Invalid wire size.");
      return;
    }

    wireDiameters = {
      awg: wireInches,
      swg: wireInches
    };
    note = "Because you entered a direct wire diameter, the AWG and SWG aspect ratios are identical.";
  } else {
    const value = parseFloat(document.getElementById("wireMetric").value);
    const wireInches = toInches(value, wireType);
    if (!Number.isFinite(wireInches) || wireInches <= 0) {
      renderError("Invalid wire size.");
      return;
    }

    wireDiameters = {
      awg: wireInches,
      swg: wireInches
    };
    note = "Because you entered a direct wire diameter, the AWG and SWG aspect ratios are identical.";
  }

  const results = WIRE_SYSTEMS.map(({ key, label }) => {
    const wireDiameterInches = wireDiameters[key];
    const aspectRatio = innerDiameterInches / wireDiameterInches;
    return { label, wireDiameterInches, aspectRatio };
  });

  const resultDiv = document.getElementById("result");
  const recommendationsDiv = document.getElementById("recommendations");

  resultDiv.innerHTML = results.map((result) => (
    buildResultCard(result.label, result.aspectRatio, result.wireDiameterInches)
  )).join("") + `<div class="result-note">${note}</div>`;

  recommendationsDiv.innerHTML = results.map((result) => (
    buildRecommendations(result.label, result.aspectRatio)
  )).join("");
}

toggleIDInputs();
toggleWireInputs();
</script>

</body>
</html>
