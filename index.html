<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jump Ring Aspect Ratio Calculator</title>

<style>
/* Overall container */
body {
  max-width: 480px;
  margin: auto;
  padding: 16px;
  font-family: Arial, sans-serif;
  background: #fafafa;
}

h2, h3, h4 {
  margin-top: 20px;
  text-align: center;
}

/* Labels and inputs */
label {
  display: block;
  margin: 12px 0 6px;
  font-weight: bold;
}

input, select {
  width: 100%;
  padding: 12px;
  font-size: 1.1rem;
  border: 1px solid #ccc;
  border-radius: 6px;
  box-sizing: border-box;
}

/* Button */
button {
  width: 100%;
  padding: 14px;
  margin-top: 20px;
  background: #0078ff;
  color: white;
  font-size: 1.2rem;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #005fcc;
}

/* Results */
#result, #recommendations {
  margin-top: 20px;
  padding: 12px;
  background: #f7f7f7;
  border-radius: 6px;
  font-size: 1.1rem;
}

/* Mobile responsiveness */
@media (max-width: 480px) {
  input, select, button {
    font-size: 1.15rem;
    padding: 14px;
  }

  label {
    font-size: 1.05rem;
  }
}
</style>
</head>

<body>

<h2>Jump Ring Aspect Ratio Calculator</h2>

<h3>Inner Diameter</h3>
<label>Unit:
  <select id="idUnit" onchange="toggleIDInputs()">
    <option value="in">Inches</option>
    <option value="mm">Millimeters</option>
    <option value="cm">Centimeters</option>
  </select>
</label>

<div id="idInchInputs">
  <label>Common Fractions:
    <select id="idFraction">
      <option value="">(choose)</option>
      <option>1/16</option>
      <option>1/8</option>
      <option>3/16</option>
      <option>1/4</option>
      <option>5/16</option>
      <option>3/8</option>
      <option>7/16</option>
      <option>1/2</option>
    </select>
  </label>
  <label>Or type your own:
    <input id="idCustom" placeholder="e.g. 3/16 or 1 5/32">
  </label>
</div>

<div id="idMetricInput" style="display:none;">
  <label>Value:
    <input id="idMetric" type="number" step="0.01">
  </label>
</div>

<h3>Wire Size</h3>
<label>Wire Input Type:
  <select id="wireType" onchange="toggleWireInputs()">
    <option value="awg">AWG</option>
    <option value="swg">SWG</option>
    <option value="in">Inches</option>
    <option value="mm">Millimeters</option>
    <option value="cm">Centimeters</option>
  </select>
</label>

<div id="wireGaugeInputs">
  <label>Gauge:
    <input id="wireGauge" type="number" min="0" max="30">
  </label>
</div>

<div id="wireInchInputs" style="display:none;">
  <label>Common Fractions:
    <select id="wireFraction">
      <option value="">(choose)</option>
      <option>1/32</option>
      <option>1/16</option>
      <option>3/32</option>
      <option>1/8</option>
    </select>
  </label>
  <label>Or type your own:
    <input id="wireCustom" placeholder="e.g. 1/16">
  </label>
</div>

<div id="wireMetricInput" style="display:none;">
  <label>Value:
    <input id="wireMetric" type="number" step="0.01">
  </label>
</div>

<button onclick="calculateAR()">Calculate AR</button>

<h3>Results</h3>
<div id="result"></div>
<div id="recommendations"></div>

<script>
const AWG = {
  0:0.3249,1:0.2893,2:0.2576,3:0.2294,4:0.2043,5:0.1819,6:0.1620,7:0.1443,8:0.1285,
  9:0.1144,10:0.1019,11:0.0907,12:0.0808,13:0.0720,14:0.0641,15:0.0571,16:0.0508,
  17:0.0453,18:0.0403,19:0.0359,20:0.0320,21:0.0285,22:0.0253,23:0.0226,24:0.0201,
  25:0.0179,26:0.0159,27:0.0142,28:0.0126,29:0.0113,30:0.0100
};

const SWG = {
  0:0.3240,1:0.3000,2:0.2760,3:0.2520,4:0.2320,5:0.2120,6:0.1920,7:0.1760,8:0.1600,
  9:0.1440,10:0.1280,11:0.1160,12:0.1040,13:0.0920,14:0.0800,15:0.0720,16:0.0640,
  17:0.0560,18:0.0480,19:0.0400,20:0.0360,21:0.0320,22:0.0280,23:0.0240,24:0.0220,
  25:0.0200,26:0.0180,27:0.0164,28:0.0148,29:0.0136,30:0.0124
};

const RECOMMENDED_AR = {
  "European 4-in-1": [3.0, 4.0],
  "European 6-in-1": [4.0, 5.0],
  "Byzantine": [3.2, 3.8],
  "Box Chain": [3.0, 3.5],
  "Half Persian 3-in-1": [4.0, 5.0],
  "Half Persian 4-in-1": [5.0, 6.0],
  "Full Persian": [5.0, 6.0]
};

function parseFraction(str) {
  if (!str) return null;
  try {
    if (str.includes(" ")) {
      const [whole, frac] = str.split(" ");
      return parseFloat(whole) + eval(frac);
    }
    if (str.includes("/")) return eval(str);
    return parseFloat(str);
  } catch {
    return null;
  }
}

function toggleIDInputs() {
  const unit = document.getElementById("idUnit").value;
  document.getElementById("idInchInputs").style.display = unit === "in" ? "block" : "none";
  document.getElementById("idMetricInput").style.display = unit !== "in" ? "block" : "none";
}

function toggleWireInputs() {
  const type = document.getElementById("wireType").value;
  document.getElementById("wireGaugeInputs").style.display = (type === "awg" || type === "swg") ? "block" : "none";
  document.getElementById("wireInchInputs").style.display = type === "in" ? "block" : "none";
  document.getElementById("wireMetricInput").style.display = (type === "mm" || type === "cm") ? "block" : "none";
}

function calculateAR() {
  const resultDiv = document.getElementById("result");
  const recDiv = document.getElementById("recommendations");
  resultDiv.innerHTML = "";
  recDiv.innerHTML = "";

  // Inner diameter
  const idUnit = document.getElementById("idUnit").value;
  let idInches;

  if (idUnit === "in") {
    const frac = document.getElementById("idFraction").value;
    const custom = document.getElementById("idCustom").value;
    idInches = parseFraction(custom || frac);
  } else {
    const val = parseFloat(document.getElementById("idMetric").value);
    if (isNaN(val) || val <= 0) return resultDiv.innerHTML = "Invalid inner diameter.";
    idInches = idUnit === "mm" ? val / 25.4 : val / 2.54;
  }

  if (!idInches || idInches <= 0) return resultDiv.innerHTML = "Invalid inner diameter.";

  // Wire diameter
  const wireType = document.getElementById("wireType").value;
  let wireInches;

  if (wireType === "awg" || wireType === "swg") {
    const gauge = parseInt(document.getElementById("wireGauge").value);
    const table = wireType === "awg" ? AWG : SWG;
    wireInches = table[gauge];
    if (!wireInches) return resultDiv.innerHTML = "Invalid gauge.";
  } else if (wireType === "in") {
    const frac = document.getElementById("wireFraction").value;
    const custom = document.getElementById("wireCustom").value;
    wireInches = parseFraction(custom || frac);
  } else {
    const val = parseFloat(document.getElementById("wireMetric").value);
    if (isNaN(val) || val <= 0) return resultDiv.innerHTML = "Invalid wire size.";
    wireInches = wireType === "mm" ? val / 25.4 : val / 2.54;
  }

  if (!wireInches || wireInches <= 0) return resultDiv.innerHTML = "Invalid wire size.";

  // Calculate AR
  const ar = idInches / wireInches;
  resultDiv.innerHTML = `Aspect Ratio: <strong>${ar.toFixed(2)}</strong>`;

  // Recommendations
  let html = "<h4>Weave Suitability</h4>";
  for (const weave in RECOMMENDED_AR) {
    const [low, high] = RECOMMENDED_AR[weave];
    if (ar >= low && ar <= high) {
      html += `✔ ${weave} (ideal ${low}–${high})<br>`;
    } else if (ar < low) {
      html += `• ${weave}: too tight (needs ≥ ${low})<br>`;
    } else {
      html += `• ${weave}: too loose (needs ≤ ${high})<br>`;
    }
  }
  recDiv.innerHTML = html;
}
</script>

</body>
</html>
